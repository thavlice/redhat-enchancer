{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "redhat-enhancer-chart.fullname" . }}
  labels:
    {{- include "redhat-enhancer-chart.labels" . | nindent 4 }}
rules:
{{ toYaml .Values.rbac.rules | indent 2 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "redhat-enhancer-chart.fullname" . }}
  labels:
    {{- include "redhat-enhancer-chart.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "redhat-enhancer-chart.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "redhat-enhancer-chart.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end -}}