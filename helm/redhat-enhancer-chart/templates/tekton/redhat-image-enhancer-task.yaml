apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: {{ index .Values.task "redhat-image-enhancer" "name" }}
  labels:
    {{- include "redhat-enhancer-chart.labels" . | nindent 4 }}
spec:
  results:
    - name: sbom-url
      description: "The JSON map of uploaded filenames to their permanent URLs"
  params:
    - name: enhancement-id
      type: string
    - name: generation-id
      type: string
      description: "The generation ID this enhancement belongs to (required for storage path)"
    - name: storage-service-url
      type: string
    - name: input-sbom-urls
      type: array
      description: "List of URLs pointing to the raw SBOMs generated by the previous step"

    # Configuration Params
    - name: image-ref
      type: string
      description: "The original image reference (e.g. registry/repo:tag)"
    - name: processors
      type: string
      default: "default"
    - name: rpms
      type: string
      default: "false"
    - name: paths
      type: string
      default: "[]"
      description: "JSON string array of path filters, e.g. '[\"/opt\", \"/bin\"]'"

  steps:
    - name: prepare-and-enhance
      image: "{{ .Values.task.agent.image }}:{{ .Values.task.agent.tag }}"
      imagePullPolicy: "{{ .Values.task.agent.pullPolicy }}"
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 2Gi
      env:
        - name: SBOMER_PNC_HOST
          value: "{{ .Values.pnc.host }}"
        - name: SBOMER_INDY_HOST
          value: "{{ .Values.indy.host }}"
        - name: SBOMER_KOJI_HUB_URL
          value: "{{ .Values.koji.hub.url }}"
        - name: SBOMER_KOJI_WEB_URL
          value: "{{ .Values.koji.web.url }}"
        - name: SBOMER_KOJI_DOWNLOAD_HOST
          value: "{{ .Values.koji.download.host }}"
        - name: QUARKUS_OIDC_CLIENT_CLIENT_ENABLED
          value: "false"
        - name: QUARKUS_OIDC_CLIENT_ENABLED
          value: "false"
        - name: TRACE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['sbomer.jboss.org/otel-trace-id']
        - name: SPAN_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['sbomer.jboss.org/otel-span-id']
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(NODE_NAME):4317

      script: |
        #!/usr/bin/env bash
        set -e
        set -o pipefail

        # Trap errors to print line numbers
        trap 'echo "❌ Error detected on line $LINENO. Exiting..."' ERR

        WORK_DIR="$(workspaces.data.path)"
        mkdir -p "$WORK_DIR/logs"
        exec > >(tee -a "$WORK_DIR/logs/enhance.log") 2>&1

        INTERNAL_BASE="$(params.storage-service-url)"

        echo "--- 1. Download and Organize Input SBOMs ---"
        echo "Using internal storage service: $INTERNAL_BASE"

        for public_url in "$@"; do
           filename=$(basename "$public_url")

           url_path=$(echo "$public_url" | sed -E 's|^https?://[^/]+||')
           internal_url="${INTERNAL_BASE%/}${url_path}"

           echo "Downloading $filename..."
           http_code=$(curl -L -s -o "$filename" -w "%{http_code}" "$internal_url")

           if [[ "$http_code" -ne 200 ]]; then
             echo "❌ Failed to download. HTTP Status: $http_code"
             echo "   Attempted URL: $internal_url"
             exit 1
           fi

           # Upstream outputs: bom-linux-amd64.json
           if [[ "$filename" == *"bom-"* ]]; then
             clean="${filename#bom-}"
             clean="${clean%.json}"
             folder_path=$(echo "$clean" | tr '-' '/') # Converts linux-amd64 to linux/amd64

             mkdir -p "$WORK_DIR/$folder_path"
             mv "$filename" "$WORK_DIR/$folder_path/bom.json"
             echo "   ✅ Placed at $WORK_DIR/$folder_path/bom.json"
           else
             echo "⚠️ Warning: Could not parse architecture from $filename. Placing in root."
             mv "$filename" "$WORK_DIR/bom.json"
           fi
        done

        echo "--- 2. Prepare Variables ---"
        PATHS_JSON='$(params.paths)'
        PATH_ARGS=""

        if [ -n "$PATHS_JSON" ] && [ "$PATHS_JSON" != "[]" ]; then
            echo "Parsing path filters: $PATHS_JSON"
            # Validate jq exists or handle error
            if ! echo "$PATHS_JSON" | jq -e . >/dev/null 2>&1; then
                 echo "❌ Error: params.paths is not valid JSON"
                 exit 1
            fi

            while IFS= read -r path; do
                if [ -n "$path" ]; then
                    PATH_ARGS="$PATH_ARGS --path-filter \"$path\""
                fi
            done < <(echo "$PATHS_JSON" | jq -r '.[]')
        fi

        RPM_FLAG="--no-rpms"
        if [ "$(params.rpms)" = "true" ]; then
          RPM_FLAG="--rpms"
        fi

        # Check if Java exists
        JAVA_BIN="${HOME}/.sdkman/candidates/java/17/bin/java"
        if [ ! -f "$JAVA_BIN" ]; then
            echo "❌ Error: Java executable not found at $JAVA_BIN"
            exit 1
        fi

        JAVA_CMD="$JAVA_BIN -XX:InitialRAMPercentage=70.0 -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError -Duser.home=/workdir -jar /workdir/generator/quarkus-run.jar"

        echo "--- 3. Download Source Code ---"
        ANY_MANIFEST=$(find "$WORK_DIR" -type f -name "bom.json" | head -n 1)

        if [ -z "$ANY_MANIFEST" ]; then
            echo "❌ Error: No bom.json files found after download step."
            exit 1
        fi

        mkdir -p "$WORK_DIR/sources"

        echo "Running SBOM download..."
        $JAVA_CMD -v sbom download --output-dir "$WORK_DIR/sources" brew-sources --path "$ANY_MANIFEST"

        echo "--- 4. Generate Source SBOM ---"
        SOURCES_ARG=""
        SOURCES_METADATA=$(find "$WORK_DIR/sources" -type f -name "*.json" | head -n 1)
        if [ -n "$SOURCES_METADATA" ]; then
             SOURCES_ARG="--sources-metadata $SOURCES_METADATA"
        fi

        SOURCES_ARCHIVE=$(find "$WORK_DIR/sources" -type f -name "*.tar.gz" | head -n 1)
        if [ -n "$SOURCES_ARCHIVE" ]; then
             echo "Scanning source archive..."
             /workdir/syft/syft -vv scan file:"${SOURCES_ARCHIVE}" -o cyclonedx-json@1.6="$(dirname "${SOURCES_ARCHIVE}")/sources.json"

             SOURCES_MANIFEST="$WORK_DIR/sources/sources.json"
             if [[ -f "$SOURCES_MANIFEST" ]]; then
                SOURCES_ARG="$SOURCES_ARG --sources-manifest $SOURCES_MANIFEST"
             fi
        fi

        echo "--- 4.5. Fetch Image Metadata (skopeo inspect) ---"

        if ! command -v skopeo &> /dev/null; then
            echo "❌ Error: 'skopeo' CLI is not installed in the agent image."
            exit 1
        fi

        AUTH_ARGS=""
        if [ -f "/tekton/creds/.docker/config.json" ]; then
            AUTH_ARGS="--authfile=/tekton/creds/.docker/config.json"
        fi

        echo "Fetching top-level digest for $(params.image-ref)..."
        skopeo inspect --no-tags docker://"$(params.image-ref)" $AUTH_ARGS > "$WORK_DIR/image.json"
        IMAGE_DIGEST=$(jq -r '.Digest' "$WORK_DIR/image.json")

        shopt -s nullglob
        manifests=("$WORK_DIR"/*/*/bom.json)

        if [ ${#manifests[@]} -eq 0 ]; then
             echo "❌ Error: No manifests found in $WORK_DIR/*/*/bom.json to inspect."
             exit 1
        fi

        for manifest in "${manifests[@]}"; do
            dir_path=$(dirname "$manifest")

            # Extract OS and Arch from the directory structure ($WORK_DIR/OS/ARCH/bom.json)
            arch=$(basename "$dir_path")
            os_dir=$(dirname "$dir_path")
            os=$(basename "$os_dir")

            echo "Fetching skopeo metadata for $(params.image-ref) (OS: $os, Arch: $arch)..."

            # Use Tekton's injected Docker credentials if they exist
            AUTH_ARGS=""
            if [ -f "/tekton/creds/.docker/config.json" ]; then
                AUTH_ARGS="--authfile=/tekton/creds/.docker/config.json"
            fi

            skopeo --override-os "$os" --override-arch "$arch" inspect --no-tags \
                docker://"$(params.image-ref)" $AUTH_ARGS \
                > "$dir_path/skopeo.json"

            echo "  ✅ Saved $dir_path/skopeo.json"
        done

        echo "--- 5. Adjust (Merge & Enrich) ---"
        # Fail if no files match
        shopt -s nullglob
        manifests=("$WORK_DIR"/*/*/bom.json)

        if [ ${#manifests[@]} -eq 0 ]; then
             echo "❌ Error: No manifests found to adjust in $WORK_DIR/*/*/bom.json"
             exit 1
        fi

        for manifest in "${manifests[@]}"; do
           echo "Adjusting $manifest..."
           $JAVA_CMD -v sbom adjust --path "$manifest" --output "$manifest" syft-image $RPM_FLAG $SOURCES_ARG $PATH_ARGS
        done

        echo "--- 6. Catalog (Image Index) ---"
        mkdir -p "$WORK_DIR/catalog"
        $JAVA_CMD -v sbom catalog --path "$WORK_DIR" --image-name "$(params.image-ref)" --image-digest "$IMAGE_DIGEST" --output "$WORK_DIR/catalog/bom.json" image-index

        echo "--- 7. Process (Validation) ---"
        for manifest in "${manifests[@]}"; do
            $JAVA_CMD -v sbom process --path "$manifest" $(params.processors)
        done
        if [ -f "$WORK_DIR/catalog/bom.json" ]; then
            $JAVA_CMD -v sbom process --path "$WORK_DIR/catalog/bom.json" $(params.processors)
        fi

        echo "✅ Task completed successfully."

      args:
        - "$(params.input-sbom-urls[*])"
      volumeMounts:
        - mountPath: /shared
          name: shared

    - name: upload
      image: "{{ .Values.task.agent.image }}:{{ .Values.task.agent.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.task.agent.pullPolicy }}
      script: |
        #!/usr/bin/env bash
        set -e
        cd $(workspaces.data.path)
        touch curl_args.txt

        # 1. Platform SBOMs
        find . -mindepth 2 -name "bom.json" | while read f; do
           clean_path="${f#./}"
           dir_path=$(dirname "$clean_path")
           variant=$(echo "$dir_path" | tr '/' '-')
           new_name="bom-${variant}.json"
           cp "$f" "$new_name"
           echo "-F files=@$new_name" >> curl_args.txt
        done

        # 2. Catalog SBOM
        if [ -f "catalog/bom.json" ]; then
           cp "catalog/bom.json" "bom-catalog.json"
           echo "-F files=@bom-catalog.json" >> curl_args.txt
        fi

        # 3. Logs
        if [ -f "logs/enhance.log" ]; then
           echo "-F files=@logs/enhance.log" >> curl_args.txt
        fi

        CURL_ARGS=$(cat curl_args.txt | tr '\n' ' ')

        # --- UPDATED URL LOGIC ---
        STORAGE_URL="$(params.storage-service-url)"
        GEN_ID="$(params.generation-id)"
        ENH_ID="$(params.enhancement-id)"

        echo "Uploading to $STORAGE_URL for Generation $GEN_ID / Enhancement $ENH_ID"

        RESPONSE=$(curl -s -f -X POST -H "Content-Type: multipart/form-data" $CURL_ARGS \
          "$STORAGE_URL/api/v1/storage/generations/$GEN_ID/enhancements/$ENH_ID")
        # -------------------------

        echo "$RESPONSE" | jq 'with_entries(select(.key | contains(".log") | not))' > $(results.sbom-url.path)

  workspaces:
    - name: data
  volumes:
    - name: shared
      emptyDir: {}